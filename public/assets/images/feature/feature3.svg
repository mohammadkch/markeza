<svg viewBox="0 0 106 100" xmlns="http://www.w3.org/2000/svg" width="100" height="100" role="img" style="">
<title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">L-shaped sofa with coffee table gold icon</title>
<desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Gold L-shape sofa and small coffee table, transparent background</desc>
<defs>
  <linearGradient id="gA" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" style="stop-color:#f5dc6a"/>
    <stop offset="50%" style="stop-color:#c8920a"/>
    <stop offset="100%" style="stop-color:#e8c030"/>
  </linearGradient>
  <linearGradient id="gB" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" style="stop-color:#fce97a"/>
    <stop offset="100%" style="stop-color:#9a6e08"/>
  </linearGradient>
  <linearGradient id="gSeat" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" style="stop-color:#f8e070"/>
    <stop offset="100%" style="stop-color:#c09018"/>
  </linearGradient>
  <linearGradient id="gC" x1="0%" y1="100%" x2="100%" y2="0%">
    <stop offset="0%" style="stop-color:#b8880e"/>
    <stop offset="100%" style="stop-color:#f0d055"/>
  </linearGradient>
</defs>

<!-- === HORIZONTAL SECTION (top, wider/longer) === -->
<!-- Back -->
<rect x="30" y="8" width="62" height="11" rx="3" fill="url(#gB)" stroke="#9a6e08" stroke-width="0.9" style="stroke:rgb(154, 110, 8);color:rgb(255, 255, 255);stroke-width:0.9px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
<!-- Seat -->
<rect x="30" y="19" width="62" height="17" rx="3" fill="url(#gSeat)" stroke="#9a6e08" stroke-width="0.9" style="stroke:rgb(154, 110, 8);color:rgb(255, 255, 255);stroke-width:0.9px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
<!-- cushion seams -->
<line x1="51" y1="19" x2="51" y2="36" stroke="#9a6e08" stroke-width="0.6" opacity="0.5" style="fill:rgb(0, 0, 0);stroke:rgb(154, 110, 8);color:rgb(255, 255, 255);stroke-width:0.6px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.5;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
<line x1="72" y1="19" x2="72" y2="36" stroke="#9a6e08" stroke-width="0.6" opacity="0.5" style="fill:rgb(0, 0, 0);stroke:rgb(154, 110, 8);color:rgb(255, 255, 255);stroke-width:0.6px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.5;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
<!-- Right armrest -->
<rect x="89" y="15" width="7" height="21" rx="3" fill="url(#gC)" stroke="#9a6e08" stroke-width="0.8" style="stroke:rgb(154, 110, 8);color:rgb(255, 255, 255);stroke-width:0.8px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
<!-- highlight -->
<rect x="32" y="10" width="18" height="4" rx="1.5" fill="none" stroke="#f8e880" stroke-width="0.5" opacity="0.4" style="fill:none;stroke:rgb(248, 232, 128);color:rgb(255, 255, 255);stroke-width:0.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.4;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

<!-- === VERTICAL SECTION (left, shorter) === -->
<!-- Back -->
<rect x="10" y="8" width="11" height="50" rx="3" fill="url(#gB)" stroke="#9a6e08" stroke-width="0.9" style="stroke:rgb(154, 110, 8);color:rgb(255, 255, 255);stroke-width:0.9px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
<!-- Seat -->
<rect x="21" y="19" width="16" height="50" rx="3" fill="url(#gSeat)" stroke="#9a6e08" stroke-width="0.9" style="stroke:rgb(154, 110, 8);color:rgb(255, 255, 255);stroke-width:0.9px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
<!-- cushion seams -->
<line x1="21" y1="42" x2="37" y2="42" stroke="#9a6e08" stroke-width="0.6" opacity="0.5" style="fill:rgb(0, 0, 0);stroke:rgb(154, 110, 8);color:rgb(255, 255, 255);stroke-width:0.6px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.5;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
<!-- Bottom chaise end cap -->
<rect x="17" y="66" width="20" height="7" rx="3" fill="url(#gC)" stroke="#9a6e08" stroke-width="0.8" style="stroke:rgb(154, 110, 8);color:rgb(255, 255, 255);stroke-width:0.8px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
<!-- highlight -->
<rect x="23" y="22" width="5" height="12" rx="2" fill="none" stroke="#f8e880" stroke-width="0.5" opacity="0.4" style="fill:none;stroke:rgb(248, 232, 128);color:rgb(255, 255, 255);stroke-width:0.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.4;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

<!-- === CORNER filler (connects the two sections) === -->
<rect x="21" y="8" width="11" height="13" rx="2" fill="url(#gA)" stroke="#9a6e08" stroke-width="0.8" style="stroke:rgb(154, 110, 8);color:rgb(255, 255, 255);stroke-width:0.8px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

<!-- === LEGS === -->
<rect x="12" y="72" width="5" height="4" rx="1" fill="#c8a020" stroke="#9a6e08" stroke-width="0.6" style="fill:rgb(200, 160, 32);stroke:rgb(154, 110, 8);color:rgb(255, 255, 255);stroke-width:0.6px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
<rect x="30" y="72" width="5" height="4" rx="1" fill="#c8a020" stroke="#9a6e08" stroke-width="0.6" style="fill:rgb(200, 160, 32);stroke:rgb(154, 110, 8);color:rgb(255, 255, 255);stroke-width:0.6px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
<rect x="90" y="34" width="5" height="4" rx="1" fill="#c8a020" stroke="#9a6e08" stroke-width="0.6" style="fill:rgb(200, 160, 32);stroke:rgb(154, 110, 8);color:rgb(255, 255, 255);stroke-width:0.6px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
<rect x="31" y="34" width="5" height="4" rx="1" fill="#c8a020" stroke="#9a6e08" stroke-width="0.6" style="fill:rgb(200, 160, 32);stroke:rgb(154, 110, 8);color:rgb(255, 255, 255);stroke-width:0.6px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

<!-- === COFFEE TABLE (small, in the open area of the L) === -->
<rect x="44" y="46" width="22" height="16" rx="3" fill="none" stroke="#e8c030" stroke-width="1.2" style="fill:none;stroke:rgb(232, 192, 48);color:rgb(255, 255, 255);stroke-width:1.2px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
<!-- table top sheen -->
<rect x="46" y="48" width="14" height="5" rx="1.5" fill="none" stroke="#f8e880" stroke-width="0.5" opacity="0.5" style="fill:none;stroke:rgb(248, 232, 128);color:rgb(255, 255, 255);stroke-width:0.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.5;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
<!-- table legs dots -->
<circle cx="47" cy="59" r="1.2" fill="#c8a020" style="fill:rgb(200, 160, 32);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
<circle cx="63" cy="59" r="1.2" fill="#c8a020" style="fill:rgb(200, 160, 32);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
<circle cx="47" cy="51" r="1.2" fill="#c8a020" style="fill:rgb(200, 160, 32);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
<circle cx="63" cy="51" r="1.2" fill="#c8a020" style="fill:rgb(200, 160, 32);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

