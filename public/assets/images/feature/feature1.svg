<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" width="100" height="100" role="img" style="">
<title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Recliner sofa side view gold icon v3</title>
<desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Gold recliner chair, headrest attached to backrest</desc>
<defs>
  <linearGradient id="gA" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" style="stop-color:#f5dc6a"/>
    <stop offset="50%" style="stop-color:#c8920a"/>
    <stop offset="100%" style="stop-color:#e8c030"/>
  </linearGradient>
  <linearGradient id="gB" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" style="stop-color:#fce97a"/>
    <stop offset="100%" style="stop-color:#9a6e08"/>
  </linearGradient>
  <linearGradient id="gC" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" style="stop-color:#f0d055"/>
    <stop offset="100%" style="stop-color:#b8880e"/>
  </linearGradient>
</defs>

<!-- Main body -->
<rect x="38" y="40" width="46" height="36" rx="6" fill="url(#gA)" stroke="#9a6e08" stroke-width="1" style="stroke:rgb(154, 110, 8);color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

<!-- Back cushion reclined ~28deg -->
<g transform="rotate(28 77 39)" style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">
  <!-- Main backrest -->
  <rect x="70" y="22" width="14" height="34" rx="5" fill="url(#gB)" stroke="#9a6e08" stroke-width="1" style="stroke:rgb(154, 110, 8);color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <!-- Headrest attached at top, slightly more angled forward (~8deg relative to backrest) -->
  <g transform="rotate(-12 77 22)" style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">
    <rect x="70" y="9" width="14" height="15" rx="5" fill="url(#gB)" stroke="#9a6e08" stroke-width="1" style="stroke:rgb(154, 110, 8);color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <!-- highlight -->
    <rect x="72" y="11" width="8" height="5" rx="2" fill="none" stroke="#f8e880" stroke-width="0.5" opacity="0.5" style="fill:none;stroke:rgb(248, 232, 128);color:rgb(255, 255, 255);stroke-width:0.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.5;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  </g>
</g>

<!-- Seat cushion top -->
<rect x="38" y="40" width="36" height="10" rx="4" fill="url(#gC)" stroke="#9a6e08" stroke-width="0.7" style="stroke:rgb(154, 110, 8);color:rgb(255, 255, 255);stroke-width:0.7px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

<!-- Footrest -->
<rect x="8" y="50" width="32" height="11" rx="4" fill="url(#gA)" stroke="#9a6e08" stroke-width="1" transform="rotate(-8 24 55)" style="stroke:rgb(154, 110, 8);color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
<rect x="10" y="51" width="26" height="5" rx="2.5" fill="none" stroke="#f8e880" stroke-width="0.5" opacity="0.5" transform="rotate(-8 23 53)" style="fill:none;stroke:rgb(248, 232, 128);color:rgb(255, 255, 255);stroke-width:0.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.5;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

<!-- Mechanical linkage -->
<line x1="36" y1="72" x2="18" y2="60" stroke="#c8a020" stroke-width="1.2" stroke-linecap="round" style="fill:rgb(0, 0, 0);stroke:rgb(200, 160, 32);color:rgb(255, 255, 255);stroke-width:1.2px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
<line x1="28" y1="72" x2="12" y2="56" stroke="#c8a020" stroke-width="1.2" stroke-linecap="round" style="fill:rgb(0, 0, 0);stroke:rgb(200, 160, 32);color:rgb(255, 255, 255);stroke-width:1.2px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
<line x1="22" y1="66" x2="30" y2="58" stroke="#c8a020" stroke-width="0.8" stroke-linecap="round" opacity="0.6" style="fill:rgb(0, 0, 0);stroke:rgb(200, 160, 32);color:rgb(255, 255, 255);stroke-width:0.8px;stroke-linecap:round;stroke-linejoin:miter;opacity:0.6;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

<!-- Armrest -->
<rect x="36" y="35" width="18" height="8" rx="3" fill="url(#gB)" stroke="#9a6e08" stroke-width="0.8" style="stroke:rgb(154, 110, 8);color:rgb(255, 255, 255);stroke-width:0.8px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

<!-- Legs -->
<rect x="42" y="74" width="6" height="5" rx="1.5" fill="#c8a020" stroke="#9a6e08" stroke-width="0.7" style="fill:rgb(200, 160, 32);stroke:rgb(154, 110, 8);color:rgb(255, 255, 255);stroke-width:0.7px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
<rect x="74" y="74" width="6" height="5" rx="1.5" fill="#c8a020" stroke="#9a6e08" stroke-width="0.7" style="fill:rgb(200, 160, 32);stroke:rgb(154, 110, 8);color:rgb(255, 255, 255);stroke-width:0.7px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

<!-- Seam detail -->
<path d="M42 54 Q55 50 68 54" fill="none" stroke="#f8e880" stroke-width="0.5" opacity="0.45" style="fill:none;stroke:rgb(248, 232, 128);color:rgb(255, 255, 255);stroke-width:0.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.45;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
</svg>